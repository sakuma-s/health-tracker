<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>健康記録一覧</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body>
<div class="container mt-4">
    <h1>健康記録一覧</h1>
    <a href="/records/new" class="btn btn-primary mb-3">新規登録</a>

    <div th:each="record : ${healthRecords}" class="card mb-3">
        <div class="card-body">
            <p class="mb-1"><strong>日付：</strong><span th:text="${record.date}"></span></p>
            <p class="mb-1"><strong>睡眠時間：</strong><span th:text="${record.sleepHours}"></span></p>
            <p class="mb-1"><strong>疲労度：</strong><span th:text="${record.fatigueLevel}"></span></p>
            <p class="mb-0"><strong>メモ：</strong><span th:text="${record.memo}"></span></p>
        </div>
    </div>
</div>
</body>
</html>
