<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>健康記録一覧</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body>
<div class="container mt-4">
    <h1>健康記録一覧</h1>
    <div class="d-flex gap-2 mb-3">
        <a href="/records/new" class="btn btn-primary">記録する</a>
        <form th:action="@{/logout}" method="post">
            <button type="submit" class="btn btn-outline-danger">ログアウト</button>
        </form>
    </div>
    <!-- 週平均 -->
    <div class="mb-4">
            <h5>週平均</h5>
            <div th:if="${#lists.isEmpty(weeklyAverages)}" class="text-muted">
                データがありません
            </div>
            <div class="row">
                <div class="col-md-6">
                    <div th:each="weekly : ${weeklyAverages}" class="card mb-2">
                        <div class="card-body">
                            <p class="mb-1">
                                <strong>期間：</strong>
                                <span th:text="${#temporals.format(weekly.startDate, 'yyyy/MM/dd')}"></span>
                                〜
                                <span th:text="${#temporals.format(weekly.endDate, 'yyyy/MM/dd')}"></span>
                            </p>
                            <p class="mb-1">
                                <strong>睡眠平均：</strong>
                                <span th:text="${#numbers.formatDecimal(weekly.avgSleepHours, 1, 1)}"></span>時間
                            </p>
                            <p class="mb-0">
                                <strong>疲労度平均：</strong>
                                <span th:text="${#numbers.formatDecimal(weekly.avgFatigueLevel, 1, 1)}"></span>
                            </p>
                        </div>
                    </div>
                </div>
                <div class="col-md-6">
                    <canvas id="weeklyChart"></canvas>
                </div>
            </div>
    </div>
    <!-- Chart.jsデータ -->
    <div id="chartData"
         th:attr="data-labels=${weeklyLabels}, data-sleep=${weeklySleep}, data-fatigue=${weeklyFatigue}"
         style="display:none"></div>
    <div th:each="record : ${healthRecords}" class="card mb-3">
        <div class="card-body">
            <p class="mb-1"><strong>日付：</strong><span th:text="${record.date}"></span></p>
            <p class="mb-1"><strong>睡眠時間：</strong><span th:text="${record.sleepHours}"></span></p>
            <p class="mb-1"><strong>疲労度：</strong><span th:text="${record.fatigueLevel}"></span></p>
            <p class="mb-0"><strong>メモ：</strong><span th:text="${record.memo}"></span></p>
            <a th:href="@{/records/{id}/edit(id=${record.id})}" class="btn btn-sm btn-warning mt-2">編集</a>
            <button type="button" class="btn btn-sm btn-danger mt-2" data-bs-toggle="modal"
                    th:attr="data-bs-target='#deleteModal' + ${record.id}">削除</button>
        </div>
    </div>
    <div th:each="record : ${healthRecords}">
        <div th:id="'deleteModal' + ${record.id}" class="modal fade" tabindex="-1">
            <div class="modal-dialog">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title">削除確認</h5>
                    </div>
                    <div class="modal-body">
                        <p>この記録を削除しますか？</p>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">キャンセル</button>
                        <form th:action="@{/records/{id}/delete(id=${record.id})}" method="post">
                            <button type="submit" class="btn btn-danger">削除</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
    const chartData = document.getElementById('chartData');
    const labels = JSON.parse(chartData.dataset.labels);
    const sleep = JSON.parse(chartData.dataset.sleep);
    const fatigue = JSON.parse(chartData.dataset.fatigue);

    new Chart(document.getElementById('weeklyChart'), {
        type: 'line', // 折れ線グラフ
        data: {
            labels: labels, // X軸（期間）
            datasets: [
                {
                    label: '睡眠平均（時間）',
                    data: sleep,
                    borderColor: 'rgba(54, 162, 235, 1)',
                    tension: 0.1,
                    yAxisID: 'ySleep' //左軸を指定
                },// 1本目
                {
                    label: '疲労度平均',
                    data: fatigue,
                    borderColor: 'rgba(255, 99, 132, 1)',
                    tension: 0.1,
                    yAxisID: 'yFatigue' //右軸を指定
                }// 2本目
            ]
        },
        options: {
            scales: {
                y: {
                    display: false //デフォルト軸を非表示
                },
                ySleep: {
                    type: 'linear',
                    position: 'left',
                    min: 0,
                    max: 10,
                    title: {
                        display: true,
                        text: '睡眠時間（時間）'
                    }
                },
                yFatigue: {
                    type: 'linear',
                    position: 'right',
                    min: 1,
                    max: 5,
                    title: {
                        display: true,
                        text: '疲労度'
                    },
                    grid: {
                        drawOnChartArea: false //右軸のグリット線の非表示
                    }
                }
            }
        }
    });
</script>
</html>
