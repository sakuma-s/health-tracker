<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>健康記録一覧</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
<div class="container mt-4">
    <h1>健康記録一覧</h1>
    <a href="/records/new" class="btn btn-primary mb-3">新規登録</a>

    <table class="table">
        <thead>
        <tr>
            <th>日付</th>
            <th>睡眠時間</th>
            <th>疲労度</th>
            <th>メモ</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="record : ${healthRecords}">
            <td th:text="${record.date}"></td>
            <td th:text="${record.sleepHours}"></td>
            <td th:text="${record.fatigueLevel}"></td>
            <td th:text="${record.memo}"></td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
