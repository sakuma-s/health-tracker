<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>健康記録一覧</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body>
<div class="container mt-4">
    <h1>健康記録一覧</h1>
    <div class="d-flex gap-2 mb-3">
        <a href="/records/new" class="btn btn-primary">記録する</a>
        <form th:action="@{/logout}" method="post">
            <button type="submit" class="btn btn-outline-danger">ログアウト</button>
        </form>
    </div>
    <div th:each="record : ${healthRecords}" class="card mb-3">
        <div class="card-body">
            <p class="mb-1"><strong>日付：</strong><span th:text="${record.date}"></span></p>
            <p class="mb-1"><strong>睡眠時間：</strong><span th:text="${record.sleepHours}"></span></p>
            <p class="mb-1"><strong>疲労度：</strong><span th:text="${record.fatigueLevel}"></span></p>
            <p class="mb-0"><strong>メモ：</strong><span th:text="${record.memo}"></span></p>
            <a th:href="@{/records/{id}/edit(id=${record.id})}" class="btn btn-sm btn-warning mt-2">編集</a>
            <button type="button" class="btn btn-sm btn-danger mt-2" data-bs-toggle="modal"
                    th:attr="data-bs-target='#deleteModal' + ${record.id}">削除</button>
        </div>
    </div>
    <div th:each="record : ${healthRecords}">
        <div th:id="'deleteModal' + ${record.id}" class="modal fade" tabindex="-1">
            <div class="modal-dialog">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title">削除確認</h5>
                    </div>
                    <div class="modal-body">
                        <p>この記録を削除しますか？</p>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">キャンセル</button>
                        <form th:action="@{/records/{id}/delete(id=${record.id})}" method="post">
                            <button type="submit" class="btn btn-danger">削除</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</html>
